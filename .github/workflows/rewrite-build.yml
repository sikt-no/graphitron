name: Rewrite reactor CI

on:
  push:
    branches:
      - main
      - claude/graphitron-rewrite
  pull_request:
    branches:
      - main
      - claude/graphitron-rewrite

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
      - name: Build rewrite reactor
        run: mvn -f graphitron-rewrite/pom.xml verify -Plocal-db --batch-mode
