name: Rewrite reactor CI

on:
  push:
    branches:
      - main
      - claude/graphitron-rewrite
  pull_request:
    branches:
      - main
      - claude/graphitron-rewrite

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
      - name: Build rewrite reactor
        # -Pleaf-coverage emits the per-module classifier-trace JSONL files that
        # `roadmap-tool leaf-coverage --verify` (bound to the verify phase) reads;
        # without it, drift in roadmap/inference-axis-coverage.adoc would silently
        # not be caught (the verify-mode short-circuits when traces are absent).
        run: mvn -f graphitron-rewrite/pom.xml verify -Plocal-db -Pleaf-coverage --batch-mode
