# Paired with .github/workflows/deploy-docs.yml: that workflow chains off this
# one via `workflow_run` matching on the literal `name:` string below
# ("Rewrite reactor CI") and downloads the `inference-axis-coverage` artifact
# uploaded by this run. Renaming the workflow silently disconnects the deploy;
# update both files together.
name: Rewrite reactor CI

on:
  push:
    branches:
      - main
      - claude/graphitron-rewrite
  pull_request:
    branches:
      - main
      - claude/graphitron-rewrite

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    # Native Postgres service so `-Plocal-db` resolves jdbc:postgresql://localhost:5432
    # to a real instance during graphitron-sakila-db's jooq-codegen and the
    # graphitron-sakila-example execution-tier tests. Mirrors the .claude/web-environment
    # setup (which the web sandbox runs with native pg because Docker is unavailable
    # there); CI here uses the same -Plocal-db code path so no second profile drifts.
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rewrite_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
      - name: Apply graphitron-sakila-db init.sql
        # The local-db profile expects database `rewrite_test` to exist with the rewrite-test
        # schema applied. The Postgres service container creates the database; this step
        # loads the public + nodeidfixture + idreffixture + multischema_a + multischema_b
        # tables that the jOOQ codegen reads.
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -p 5432 -U postgres -d rewrite_test \
            -f graphitron-rewrite/graphitron-sakila-db/src/main/resources/init.sql
      - name: Build rewrite reactor
        # The leaf-coverage profile (parent pom) is active by default; its activation
        # is property-based negation on -Dleaf-coverage.skip, so the classifier traces
        # the regen step below reads from are produced on every CI run. Local opt-out
        # for faster turnaround is -Dleaf-coverage.skip; CI does not opt out.
        run: mvn -f graphitron-rewrite/pom.xml verify -Plocal-db --batch-mode
      - name: Regenerate leaf-coverage report
        # Only on trunk pushes: PRs ship the placeholder, and the artifact is
        # consumed by deploy-docs which itself only runs on trunk. The regen
        # overwrites graphitron-rewrite/roadmap/inference-axis-coverage.adoc
        # in the workspace; the upload step below captures that overwritten
        # file. The classifier traces that `leaf-coverage` reads from are
        # produced by the `mvn verify` above.
        if: github.event_name == 'push' && github.ref == 'refs/heads/claude/graphitron-rewrite'
        run: |
          mvn -f graphitron-rewrite/pom.xml -pl roadmap-tool exec:java \
            -Dexec.args='leaf-coverage graphitron-rewrite' --batch-mode
      - name: Upload leaf-coverage artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/claude/graphitron-rewrite'
        uses: actions/upload-artifact@v4
        with:
          name: inference-axis-coverage
          path: graphitron-rewrite/roadmap/inference-axis-coverage.adoc
          if-no-files-found: error
