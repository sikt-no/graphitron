name: Rewrite reactor CI

on:
  push:
    branches:
      - main
      - claude/graphitron-rewrite
  pull_request:
    branches:
      - main
      - claude/graphitron-rewrite

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    # Native Postgres service so `-Plocal-db` resolves jdbc:postgresql://localhost:5432
    # to a real instance during graphitron-sakila-db's jooq-codegen and the
    # graphitron-sakila-example execution-tier tests. Mirrors the .claude/web-environment
    # setup (which the web sandbox runs with native pg because Docker is unavailable
    # there); CI here uses the same -Plocal-db code path so no second profile drifts.
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rewrite_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
      - name: Build + install libtree-sitter from source
        # graphitron-lsp's NativeLibraryBundleTest loads the grammar binary from
        # graphitron-tree-sitter-natives; jtreesitter 0.26 then looks up runtime
        # symbols against an OS-installed libtree-sitter. Ubuntu apt's
        # libtree-sitter0 is pinned to 0.20.x which predates ts_language_abi_version,
        # so we build the runtime from upstream source at the version matching
        # the natives jar's parser ABI.
        run: |
          set -euo pipefail
          VERSION=v0.26.9
          TMPDIR=$(mktemp -d) && trap "rm -rf $TMPDIR" EXIT
          git clone --depth=1 --branch=$VERSION https://github.com/tree-sitter/tree-sitter $TMPDIR/ts
          make -C $TMPDIR/ts
          sudo make -C $TMPDIR/ts install
          sudo ldconfig
      - name: Apply graphitron-sakila-db init.sql
        # The local-db profile expects database `rewrite_test` to exist with the rewrite-test
        # schema applied. The Postgres service container creates the database; this step
        # loads the public + nodeidfixture + idreffixture + multischema_a + multischema_b
        # tables that the jOOQ codegen reads.
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -p 5432 -U postgres -d rewrite_test \
            -f graphitron-sakila-db/src/main/resources/init.sql
      - name: Build rewrite reactor
        # The leaf-coverage profile (parent pom) is active by default; its activation
        # is property-based negation on -Dleaf-coverage.skip, so the classifier traces
        # are emitted on every CI run. Local opt-out for faster turnaround is
        # -Dleaf-coverage.skip; CI does not opt out.
        #
        # -T 1C runs the reactor module-parallel (one thread per core) with tests on,
        # making parallel test tolerance an enforced invariant, not an aspiration (R474):
        # web sandbox sessions build through mvnd with the same module-parallel default,
        # and a test that fails only under parallel execution must fail here at the gate.
        # The fix for such a failure is the test, never serializing this build.
        run: mvn verify -Plocal-db --batch-mode -T 1C
      - name: Regenerate leaf-coverage report
        # Trunk-push only. PRs and main pushes skip; the artifact only feeds the
        # downstream docs-build/docs-deploy jobs, which are themselves trunk-gated.
        if: github.event_name == 'push' && github.ref == 'refs/heads/claude/graphitron-rewrite'
        run: |
          mvn -pl roadmap-tool exec:java -q \
            -Dexec.args='leaf-coverage .'
      - name: Upload leaf-coverage artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/claude/graphitron-rewrite'
        uses: actions/upload-artifact@v7
        with:
          name: inference-axis-coverage
          path: roadmap/inference-axis-coverage.adoc
          if-no-files-found: error

  docs-build:
    # Renders the docs site against the freshly-regenerated leaf-coverage report
    # produced by the `build` job. Trunk-push only; PRs use preview-docs.yml.
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/claude/graphitron-rewrite'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
      - name: Download leaf-coverage artifact
        # Lands at roadmap/inference-axis-coverage.adoc and
        # overwrites the committed placeholder in this checkout.
        uses: actions/download-artifact@v8
        with:
          name: inference-axis-coverage
          path: roadmap/
      - name: Build docs site
        run: mvn -pl :graphitron-docs -am package -DskipTests
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/target/generated-docs

  docs-deploy:
    needs: docs-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/claude/graphitron-rewrite'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deploy1.outputs.page_url || steps.deploy2.outputs.page_url || steps.deploy3.outputs.page_url }}
    steps:
      # actions/deploy-pages intermittently fails with "Deployment failed, try
      # again later" on GitHub's Pages backend (a known upstream flake, see
      # actions/deploy-pages#406), unrelated to our docs content or build. Retry
      # with backoff instead of failing trunk CI on a transient backend error.
      - name: Deploy to GitHub Pages (attempt 1)
        id: deploy1
        continue-on-error: true
        uses: actions/deploy-pages@v4
      - name: Wait before retry 1
        if: steps.deploy1.outcome == 'failure'
        run: sleep 30
      - name: Deploy to GitHub Pages (attempt 2)
        id: deploy2
        if: steps.deploy1.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v4
      - name: Wait before retry 2
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        run: sleep 60
      - name: Deploy to GitHub Pages (attempt 3)
        id: deploy3
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        uses: actions/deploy-pages@v4
