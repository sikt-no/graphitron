name: Sync main with trunk

# Fast-forwards `main` to follow the `claude/graphitron-rewrite` integration trunk.
#
# Web sandbox sessions can only push to `claude/*` branches (the git proxy rejects
# pushes to `main` with HTTP 403), so day-to-day work lands on the trunk and `main`
# tracks it from here. This job runs with GITHUB_TOKEN, which is not subject to the
# sandbox proxy, so the push it cannot do from a session succeeds in CI.
#
# The merge is `--ff-only`: if the trunk is not strictly ahead of `main` (e.g. `main`
# was advanced independently), the job fails loudly rather than creating a merge commit
# or rewriting history.

on:
  push:
    branches:
      - claude/graphitron-rewrite
  workflow_dispatch:

permissions:
  contents: write

# Never let two syncs race the same fast-forward; queue them instead.
concurrency:
  group: sync-main
  cancel-in-progress: false

jobs:
  fast-forward-main:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Fast-forward main to trunk
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin claude/graphitron-rewrite
          if git merge-base --is-ancestor main origin/claude/graphitron-rewrite; then
            git merge --ff-only origin/claude/graphitron-rewrite
            git push origin main
            echo "main fast-forwarded to $(git rev-parse --short HEAD)."
          else
            echo "::error::main is not an ancestor of claude/graphitron-rewrite; refusing non-fast-forward sync."
            exit 1
          fi
