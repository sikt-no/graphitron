name: Preview docs (PR artifact)

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'roadmap/**'
      - 'pom.xml'
      - '.github/workflows/preview-docs.yml'

permissions:
  contents: read

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
      - name: Build docs site
        run: mvn -pl :graphitron-docs -am package -DskipTests
      - name: Upload preview artifact
        uses: actions/upload-artifact@v7
        with:
          name: graphitron-docs-preview-${{ github.event.pull_request.number }}
          path: docs/target/generated-docs
          retention-days: 14
