name: Deploy docs to GitHub Pages

on:
  push:
    branches:
      - claude/graphitron-rewrite
    paths:
      - 'docs/**'
      - 'graphitron-rewrite/docs/**'
      - 'graphitron-rewrite/roadmap/**'
      - 'graphitron-rewrite/pom.xml'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
      - name: Build docs site
        run: mvn -f graphitron-rewrite/pom.xml -pl :graphitron-docs -am package -DskipTests
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/target/generated-docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
