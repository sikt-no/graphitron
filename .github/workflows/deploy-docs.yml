# Paired with .github/workflows/rewrite-build.yml: this workflow chains off
# that one via `workflow_run` matching on its literal `name:` string
# ("Rewrite reactor CI") and downloads the `inference-axis-coverage` artifact
# it uploads. Renaming the reactor workflow silently disconnects this deploy;
# update both files together.
name: Deploy docs to GitHub Pages

on:
  workflow_run:
    workflows: ['Rewrite reactor CI']
    types: [completed]
    branches: [claude/graphitron-rewrite]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
      - name: Download leaf-coverage artifact
        # Overwrites the committed placeholder
        # graphitron-rewrite/roadmap/inference-axis-coverage.adoc with the
        # report produced by the matching reactor run.
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: inference-axis-coverage
          path: graphitron-rewrite/roadmap/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Build docs site
        run: mvn -f graphitron-rewrite/pom.xml -pl :graphitron-docs -am package -DskipTests
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/target/generated-docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
