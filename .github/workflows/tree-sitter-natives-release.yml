name: tree-sitter natives release

# Builds and publishes `no.sikt:graphitron-tree-sitter-natives:<version>`
# to Maven Central. Operator guide (when to bump which digit, what each
# stage verifies, recovery from a broken release):
# https://graphitron.sikt.no/architecture/tree-sitter-natives-release.html

on:
  workflow_dispatch:
    inputs:
      tree-sitter-cli-version:
        description: 'Upstream tree-sitter tag. Pins both the CLI used to build the grammar and the source checkout the bundled libtree-sitter runtime is built from. Must match the runtime version in pom.xml (e.g. tag v0.26.9 -> pom 0.26.9-<build-n>).'
        required: true
        default: 'v0.26.9'
      dry-run:
        description: 'Skip deploy + post-deploy verify (run only build matrix, package, and jar-layout assertion).'
        type: boolean
        default: false

permissions:
  contents: read

env:
  NATIVES_MODULE: graphitron-rewrite/graphitron-tree-sitter-natives
  GRAMMAR_DIR: graphitron-rewrite/graphitron-tree-sitter-natives/src/main/native/grammars/graphql

jobs:
  build-matrix:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: linux-x86_64
            runner: ubuntu-latest
            lib-name: libtree-sitter-graphql.so
            runtime-name: libtree-sitter.so
            cli-asset: tree-sitter-linux-x64.gz
            cli-binary: tree-sitter
          - platform: linux-aarch64
            runner: ubuntu-24.04-arm
            lib-name: libtree-sitter-graphql.so
            runtime-name: libtree-sitter.so
            cli-asset: tree-sitter-linux-arm64.gz
            cli-binary: tree-sitter
          - platform: macos-aarch64
            runner: macos-14
            lib-name: libtree-sitter-graphql.dylib
            runtime-name: libtree-sitter.dylib
            cli-asset: tree-sitter-macos-arm64.gz
            cli-binary: tree-sitter
          - platform: windows-x86_64
            runner: windows-latest
            lib-name: tree-sitter-graphql.dll
            # Windows DLLs follow platform convention: no "lib" prefix (matches the grammar).
            runtime-name: tree-sitter.dll
            cli-asset: tree-sitter-windows-x64.gz
            cli-binary: tree-sitter.exe
    steps:
      - uses: actions/checkout@v6

      - name: Download tree-sitter CLI (${{ inputs.tree-sitter-cli-version }})
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/ts-cli"
          cd "$RUNNER_TEMP/ts-cli"
          asset="${{ matrix.cli-asset }}"
          url="https://github.com/tree-sitter/tree-sitter/releases/download/${{ inputs.tree-sitter-cli-version }}/${asset}"
          curl -fsSL -o "$asset" "$url"
          if [[ "$asset" == *.zip ]]; then
            unzip -q "$asset"
          else
            # gunzip needs the .gz suffix to know what to do; it strips it on success.
            gunzip "$asset"
            mv "${asset%.gz}" "${{ matrix.cli-binary }}"
          fi
          chmod +x "${{ matrix.cli-binary }}" || true
          ls -la
          echo "TS_CLI=$RUNNER_TEMP/ts-cli/${{ matrix.cli-binary }}" >> "$GITHUB_ENV"

      - name: Verify CLI runs
        shell: bash
        run: |
          set -euo pipefail
          "$TS_CLI" --version

      - name: Build ${{ matrix.lib-name }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/out"
          "$TS_CLI" build --output "$RUNNER_TEMP/out/${{ matrix.lib-name }}" "$GRAMMAR_DIR"

      - name: Verify exported symbols (POSIX)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          lib="$RUNNER_TEMP/out/${{ matrix.lib-name }}"
          # `nm -gU` works on both ELF (binutils) and Mach-O (macOS llvm-nm).
          nm_out="$(nm -gU "$lib" 2>/dev/null || nm -g --defined-only "$lib")"
          echo "$nm_out" | grep -E '(^| )_?tree_sitter_graphql( |$)' >/dev/null \
            || { echo "::error::tree_sitter_graphql not exported in $lib"; exit 1; }
          echo "OK: tree_sitter_graphql exported"

      - name: Verify exported symbols (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $lib = "$env:RUNNER_TEMP/out/${{ matrix.lib-name }}"
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsroot = & "$vswhere" -latest -property installationPath
          $dumpbin = Get-ChildItem -Path "$vsroot\VC\Tools\MSVC" -Recurse -Filter dumpbin.exe |
                     Select-Object -First 1 -ExpandProperty FullName
          if (-not $dumpbin) { Write-Error "dumpbin.exe not found"; exit 1 }
          $exports = & "$dumpbin" /exports "$lib"
          if (-not ($exports -match 'tree_sitter_graphql')) {
            Write-Error "tree_sitter_graphql not exported in $lib"
            exit 1
          }
          Write-Output "OK: tree_sitter_graphql exported"

      # ---- tree-sitter runtime (libtree-sitter) -------------------------------
      # Built from the same pinned upstream tag as the grammar, but from source
      # (the `lib/` directory) rather than the CLI binary. Bundling it removes
      # the LSP's only system dependency. Provenance + flags: see the natives
      # module UPSTREAM.md "Runtime provenance" section.

      - name: Build libtree-sitter runtime (POSIX)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          src="$RUNNER_TEMP/ts-src"
          out="$RUNNER_TEMP/out"
          mkdir -p "$out"
          git clone --depth=1 --branch="${{ inputs.tree-sitter-cli-version }}" \
            https://github.com/tree-sitter/tree-sitter "$src"
          make -C "$src" CFLAGS="-O3"
          # The top-level make leaves an unversioned shared-lib symlink at the repo
          # root; fall back to the newest versioned artifact if the name differs.
          built="$src/${{ matrix.runtime-name }}"
          if [[ ! -e "$built" ]]; then
            built="$(ls -1 "$src/${{ matrix.runtime-name }}"* 2>/dev/null | sort | tail -n1)"
          fi
          # -L dereferences the symlink so we stage the real binary under the canonical name.
          cp -L "$built" "$out/${{ matrix.runtime-name }}"
          ls -la "$out/${{ matrix.runtime-name }}"

      - name: Set up MSYS2 + MinGW-w64 (Windows runtime build)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: >-
            git
            make
            mingw-w64-x86_64-gcc

      - name: Build libtree-sitter runtime (Windows, MinGW-w64)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          set -euo pipefail
          tmp="$(cygpath -u "$RUNNER_TEMP")"
          src="$tmp/ts-src"
          out="$tmp/out"
          mkdir -p "$out"
          git clone --depth=1 --branch="${{ inputs.tree-sitter-cli-version }}" \
            https://github.com/tree-sitter/tree-sitter "$src"
          # In the MSYS2 MINGW64 environment the unprefixed gcc/ar (from
          # mingw-w64-x86_64-gcc, in /mingw64/bin) ARE the native x86_64
          # mingw-w64 toolchain. The triplet-prefixed x86_64-w64-mingw32-ar
          # alias is not installed, so use the unprefixed names.
          # Static-link the MinGW runtime so the DLL carries no libgcc_s_seh-1 /
          # libwinpthread-1 transitive deps (enforced by the dependents allowlist below).
          make -C "$src" \
            CC=gcc \
            AR=ar \
            CFLAGS="-O3" \
            LDFLAGS="-static -static-libgcc"
          built="$(ls -1 "$src"/libtree-sitter.dll "$src"/*.dll 2>/dev/null | head -n1)"
          cp "$built" "$out/${{ matrix.runtime-name }}"
          ls -la "$out/${{ matrix.runtime-name }}"

      - name: Verify runtime exported symbols (POSIX)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          lib="$RUNNER_TEMP/out/${{ matrix.runtime-name }}"
          nm_out="$(nm -gU "$lib" 2>/dev/null || nm -g --defined-only "$lib")"
          for sym in ts_language_abi_version ts_parser_new ts_parser_parse ts_parser_delete; do
            echo "$nm_out" | grep -E "(^| )_?$sym( |$)" >/dev/null \
              || { echo "::error::$sym not exported in $lib"; exit 1; }
          done
          echo "OK: runtime exports ts_language_abi_version + core ts_parser_*"

      - name: Verify runtime transitive deps (POSIX allowlist)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          lib="$RUNNER_TEMP/out/${{ matrix.runtime-name }}"
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            # otool -L: allow only the macOS system frameworks + the lib's own install id.
            bad="$(otool -L "$lib" | tail -n +2 | awk '{print $1}' \
              | grep -vE '^(/usr/lib/|/System/Library/)' | grep -vE 'libtree-sitter' || true)"
          else
            # ldd: allow only glibc + the dynamic loader + the base gcc runtime. Anything
            # else (a vendored or third-party .so) means we are shipping provenance we do not own.
            bad="$(ldd "$lib" | awk '{print $1}' \
              | grep -vE '(linux-vdso|ld-linux|libc\.so|libm\.so|libdl\.so|libpthread\.so|librt\.so|libgcc_s\.so)' || true)"
          fi
          if [[ -n "$bad" ]]; then
            echo "::error::runtime links against non-allowlisted libraries:"; echo "$bad"; exit 1
          fi
          echo "OK: runtime links only against the per-platform system allowlist"

      - name: Verify runtime exported symbols + deps (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $lib = "$env:RUNNER_TEMP/out/${{ matrix.runtime-name }}"
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsroot = & "$vswhere" -latest -property installationPath
          $dumpbin = Get-ChildItem -Path "$vsroot\VC\Tools\MSVC" -Recurse -Filter dumpbin.exe |
                     Select-Object -First 1 -ExpandProperty FullName
          if (-not $dumpbin) { Write-Error "dumpbin.exe not found"; exit 1 }
          $exports = & "$dumpbin" /exports "$lib"
          foreach ($sym in @('ts_language_abi_version','ts_parser_new','ts_parser_parse','ts_parser_delete')) {
            if (-not ($exports -match $sym)) { Write-Error "$sym not exported in $lib"; exit 1 }
          }
          Write-Output "OK: runtime exports ts_language_abi_version + core ts_parser_*"
          # dumpbin /dependents: allow only the Windows system CRT/kernel DLLs. A MinGW
          # runtime dep (libgcc_s_seh-1.dll / libwinpthread-1.dll) here means static-link failed.
          $deps = & "$dumpbin" /dependents "$lib"
          $allow = '^(kernel32|ucrtbase|vcruntime\d*|msvcrt|ntdll|advapi32|api-ms-win-[\w-]+)\.dll$'
          $bad = $deps |
            Select-String -Pattern '^\s+\S+\.dll\s*$' |
            ForEach-Object { $_.Line.Trim() } |
            Where-Object { $_ -notmatch $allow }
          if ($bad) { Write-Error "runtime links against non-allowlisted DLLs:`n$($bad -join "`n")"; exit 1 }
          Write-Output "OK: runtime links only against the Windows system DLL allowlist"

      - name: Upload binary artifacts
        uses: actions/upload-artifact@v7
        with:
          name: native-${{ matrix.platform }}
          # Whole out/ dir: grammar + runtime, both staged under their canonical names.
          path: ${{ runner.temp }}/out
          if-no-files-found: error
          retention-days: 7

  package-deploy:
    name: Package + deploy to Maven Central
    needs: build-matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Java for publishing
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Download all native artifacts
        uses: actions/download-artifact@v8
        with:
          path: native-artifacts/
          pattern: native-*

      - name: Stage binaries under target/classes/lib/<os>-<arch>/
        run: |
          set -euo pipefail
          base="$NATIVES_MODULE/target/classes/lib"
          mkdir -p "$base"
          for platform in linux-x86_64 linux-aarch64 macos-aarch64 windows-x86_64; do
            src="native-artifacts/native-$platform"
            if [[ ! -d "$src" ]]; then
              echo "::error::missing artifact directory $src"
              exit 1
            fi
            mkdir -p "$base/$platform"
            cp -v "$src"/* "$base/$platform/"
          done
          find "$base" -type f | sort

      - name: Package jar
        run: |
          mvn -f "$NATIVES_MODULE/pom.xml" --batch-mode --errors package -DskipTests

      - name: Assert jar layout
        # Exactly eight lib/<os>-<arch>/<file> entries (four grammar + four runtime);
        # any other lib/* path is a bug.
        run: |
          set -euo pipefail
          # Pin to the main artifact; the broad glob also matches -sources.jar and -javadoc.jar.
          version="$(grep -m1 '<version>' $NATIVES_MODULE/pom.xml | sed -E 's|.*<version>([^<]+)</version>.*|\1|')"
          jar_path="$NATIVES_MODULE/target/graphitron-tree-sitter-natives-${version}.jar"
          echo "Inspecting $jar_path"
          unzip -l "$jar_path"
          # Filter out the bare lib/ and lib/<os>-<arch>/ directory entries unzip -l also prints.
          lib_entries="$(unzip -l "$jar_path" | awk '{print $4}' | grep -E '^lib/.+[^/]$' || true)"
          expected="lib/linux-aarch64/libtree-sitter-graphql.so
          lib/linux-aarch64/libtree-sitter.so
          lib/linux-x86_64/libtree-sitter-graphql.so
          lib/linux-x86_64/libtree-sitter.so
          lib/macos-aarch64/libtree-sitter-graphql.dylib
          lib/macos-aarch64/libtree-sitter.dylib
          lib/windows-x86_64/tree-sitter-graphql.dll
          lib/windows-x86_64/tree-sitter.dll"
          expected="$(echo "$expected" | sed 's/^ *//' | sort)"
          actual="$(echo "$lib_entries" | sort)"
          if [[ "$actual" != "$expected" ]]; then
            echo "::error::jar lib/ contents do not match the expected eight entries"
            diff <(echo "$expected") <(echo "$actual") || true
            exit 1
          fi
          echo "OK: jar layout matches exactly the eight expected lib/<os>-<arch>/ entries"

      - name: Deploy to Maven Central
        if: ${{ !inputs.dry-run }}
        run: |
          mvn -f "$NATIVES_MODULE/pom.xml" --batch-mode --errors deploy -DskipTests
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_PORTAL_TOKEN }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Read published version
        id: version
        run: |
          set -euo pipefail
          version="$(grep -m1 '<version>' $NATIVES_MODULE/pom.xml | sed -E 's|.*<version>([^<]+)</version>.*|\1|')"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Published version: $version"
    outputs:
      version: ${{ steps.version.outputs.version }}

  post-deploy-verify:
    name: Verify ${{ matrix.platform }} from Central
    needs: package-deploy
    if: ${{ !inputs.dry-run }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86_64
            runner: ubuntu-latest
          - platform: linux-aarch64
            runner: ubuntu-24.04-arm
          - platform: macos-aarch64
            runner: macos-14
          - platform: windows-x86_64
            runner: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      # No "Install libtree-sitter" step: the whole point of this item is that the
      # runtime now ships inside the jar. The verifier below composes the bundled
      # runtime and must load+parse with NO system libtree-sitter present, proving
      # the jar is self-sufficient on every platform.

      - name: Resolve published jar into a clean local m2
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.package-deploy.outputs.version }}"
          repo="$RUNNER_TEMP/m2-clean"
          mkdir -p "$repo"
          # Retry loop covers central-publishing-maven-plugin's autoPublish propagation delay.
          attempt=1
          until mvn -B dependency:get \
                  -Dmaven.repo.local="$repo" \
                  -Dartifact=no.sikt:graphitron-tree-sitter-natives:$version \
                  -DremoteRepositories=central::default::https://repo.maven.apache.org/maven2; do
            if (( attempt >= 12 )); then
              echo "::error::artifact $version not available on Central after $attempt attempts"
              exit 1
            fi
            echo "attempt $attempt failed; sleeping 60s before retry"
            attempt=$(( attempt + 1 ))
            sleep 60
          done
          echo "M2_REPO=$repo" >> "$GITHUB_ENV"
          echo "NATIVES_VERSION=$version" >> "$GITHUB_ENV"

      - name: Write verifier harness
        # Standalone load+parse against the published jar. Inlined to decouple
        # this stage from any in-flight graphitron-lsp test class.
        #
        # jtreesitter resolves the runtime (ts_* symbols) NOT from the
        # SymbolLookup passed to Language.load, but through its own
        # NativeLibraryLookup SPI chain at TreeSitter.<clinit>. So to load with
        # no system libtree-sitter we must register an SPI service that hands
        # back the bundled runtime, exactly as graphitron-lsp's
        # BundledLibraryLookup does. The grammar entry point is supplied
        # separately via Language.load. RuntimeBundleLookup is that SPI;
        # Verify.main supplies the grammar.
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p verifier/META-INF/services
          echo "RuntimeBundleLookup" > verifier/META-INF/services/io.github.treesitter.jtreesitter.NativeLibraryLookup

          cat > verifier/RuntimeBundleLookup.java <<'JAVA'
          import io.github.treesitter.jtreesitter.NativeLibraryLookup;
          import java.io.InputStream;
          import java.lang.foreign.Arena;
          import java.lang.foreign.SymbolLookup;
          import java.nio.file.Files;
          import java.nio.file.Path;
          import java.nio.file.StandardCopyOption;
          import java.util.Locale;

          /**
           * jtreesitter NativeLibraryLookup SPI that supplies the bundled
           * tree-sitter runtime (the ts_* symbols) from the natives jar. This
           * mirrors graphitron-lsp's BundledLibraryLookup: jtreesitter calls it
           * at TreeSitter.<clinit> to bind the runtime, with no system
           * libtree-sitter present.
           */
          public final class RuntimeBundleLookup implements NativeLibraryLookup {
              public RuntimeBundleLookup() {}

              @Override
              public SymbolLookup get(Arena arena) {
                  String os = System.getProperty("os.name", "").toLowerCase(Locale.ROOT);
                  String arch = System.getProperty("os.arch", "").toLowerCase(Locale.ROOT);
                  String dir, runtimeName;
                  if (os.contains("linux") && (arch.equals("amd64") || arch.equals("x86_64"))) {
                      dir = "linux-x86_64"; runtimeName = "libtree-sitter.so";
                  } else if (os.contains("linux") && arch.equals("aarch64")) {
                      dir = "linux-aarch64"; runtimeName = "libtree-sitter.so";
                  } else if (os.contains("mac") && arch.equals("aarch64")) {
                      dir = "macos-aarch64"; runtimeName = "libtree-sitter.dylib";
                  } else if (os.contains("windows") && (arch.equals("amd64") || arch.equals("x86_64"))) {
                      dir = "windows-x86_64"; runtimeName = "tree-sitter.dll";
                  } else {
                      throw new IllegalStateException("unsupported os/arch: " + os + "/" + arch);
                  }
                  String resource = "lib/" + dir + "/" + runtimeName;
                  try {
                      Path target = Files.createTempFile("verify-rt-", "-" + runtimeName);
                      try (InputStream in = RuntimeBundleLookup.class.getClassLoader().getResourceAsStream(resource)) {
                          if (in == null) throw new IllegalStateException("missing classpath resource: " + resource);
                          Files.copy(in, target, StandardCopyOption.REPLACE_EXISTING);
                      }
                      return SymbolLookup.libraryLookup(target, arena);
                  } catch (Exception e) {
                      throw new RuntimeException("failed to load bundled runtime " + resource, e);
                  }
              }
          }
          JAVA

          cat > verifier/Verify.java <<'JAVA'
          import io.github.treesitter.jtreesitter.Language;
          import io.github.treesitter.jtreesitter.Parser;
          import io.github.treesitter.jtreesitter.Tree;
          import java.io.InputStream;
          import java.lang.foreign.Arena;
          import java.lang.foreign.SymbolLookup;
          import java.nio.file.Files;
          import java.nio.file.Path;
          import java.nio.file.StandardCopyOption;
          import java.util.Locale;

          public final class Verify {
              public static void main(String[] args) throws Exception {
                  String os = System.getProperty("os.name", "").toLowerCase(Locale.ROOT);
                  String arch = System.getProperty("os.arch", "").toLowerCase(Locale.ROOT);
                  String dir, libName;
                  if (os.contains("linux") && (arch.equals("amd64") || arch.equals("x86_64"))) {
                      dir = "linux-x86_64"; libName = "libtree-sitter-graphql.so";
                  } else if (os.contains("linux") && arch.equals("aarch64")) {
                      dir = "linux-aarch64"; libName = "libtree-sitter-graphql.so";
                  } else if (os.contains("mac") && arch.equals("aarch64")) {
                      dir = "macos-aarch64"; libName = "libtree-sitter-graphql.dylib";
                  } else if (os.contains("windows") && (arch.equals("amd64") || arch.equals("x86_64"))) {
                      dir = "windows-x86_64"; libName = "tree-sitter-graphql.dll";
                  } else {
                      throw new IllegalStateException("unsupported os/arch: " + os + "/" + arch);
                  }
                  // The runtime (ts_* symbols) comes from RuntimeBundleLookup (the registered
                  // NativeLibraryLookup SPI) with NO system libtree-sitter present. Language.load
                  // only needs the grammar entry point, so we hand it just the grammar lookup.
                  Path grammarLib = extract("lib/" + dir + "/" + libName, libName);
                  try (Arena arena = Arena.ofConfined()) {
                      SymbolLookup grammar = SymbolLookup.libraryLookup(grammarLib, arena);
                      Language language = Language.load(grammar, "tree_sitter_graphql");
                      try (Parser parser = new Parser(language)) {
                          Tree tree = parser.parse("type Query { hello: String }").orElseThrow();
                          try (tree) {
                              String type = tree.getRootNode().getType();
                              boolean hasError = tree.getRootNode().hasError();
                              if (!"source_file".equals(type)) throw new IllegalStateException("root type: " + type);
                              if (hasError) throw new IllegalStateException("parse produced errors");
                              System.out.println("OK: parsed source_file with no errors on " + dir
                                  + " (bundled runtime via SPI, no system libtree-sitter)");
                          }
                      }
                  }
              }

              private static Path extract(String resource, String name) throws Exception {
                  Path target = Files.createTempFile("verify-", "-" + name);
                  try (InputStream in = Verify.class.getClassLoader().getResourceAsStream(resource)) {
                      if (in == null) throw new IllegalStateException("missing classpath resource: " + resource);
                      Files.copy(in, target, StandardCopyOption.REPLACE_EXISTING);
                  }
                  return target;
              }
          }
          JAVA

      - name: Resolve jtreesitter (runtime dep for the verifier)
        shell: bash
        run: |
          set -euo pipefail
          mvn -B dependency:get \
              -Dmaven.repo.local="$M2_REPO" \
              -Dartifact=io.github.tree-sitter:jtreesitter:0.26.0 \
              -DremoteRepositories=central::default::https://repo.maven.apache.org/maven2
          echo "JTREESITTER_JAR=$M2_REPO/io/github/tree-sitter/jtreesitter/0.26.0/jtreesitter-0.26.0.jar" >> "$GITHUB_ENV"
          echo "NATIVES_JAR=$M2_REPO/no/sikt/graphitron-tree-sitter-natives/$NATIVES_VERSION/graphitron-tree-sitter-natives-$NATIVES_VERSION.jar" >> "$GITHUB_ENV"

      - name: Compile + run verifier
        shell: bash
        run: |
          set -euo pipefail
          # git-bash on Windows still needs Windows-style ';' classpath separators for the JVM.
          sep=":"
          if [[ "$RUNNER_OS" == "Windows" ]]; then sep=";"; fi
          cp="$JTREESITTER_JAR$sep$NATIVES_JAR"
          javac -cp "$cp" -d verifier verifier/RuntimeBundleLookup.java verifier/Verify.java
          # The `verifier` dir carries the compiled SPI class + its META-INF/services
          # registration, so jtreesitter's ServiceLoader picks up RuntimeBundleLookup.
          java --enable-native-access=ALL-UNNAMED -cp "verifier$sep$cp" Verify
