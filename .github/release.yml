changelog:
  exclude:
    labels:
      - internal
      - github_actions
  categories:
    - title: 💥 Breaking Changes
      labels:
        - breaking
    - title: 🚀 New features and improvements
      labels:
        - enhancement
    - title: 🐛 Bug Fixes
      labels:
        - bug fix
    - title: 📝 Documentation updates
      labels:
        - documentation
    - title: 📦 Dependencies
      labels:
        - dependencies
    - title: 🔧 Other Changes
      labels:
        - "*"
