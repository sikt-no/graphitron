# Publishes the graphitron-rewrite reactor to the Sikt GitLab Packages Maven
# registry as a secondary distribution channel alongside Maven Central.
# See https://platon.sikt.no/tjenester/package_registry
#
# Triggers:
#   - tags matching v<MAJOR>.<MINOR>.<PATCH>(-RC<n>)?  -> release deploy
#
# Default-branch pushes do not trigger any publish. Snapshots are not a
# useful consumer-facing artifact: consumers depend on release coordinates,
# and developer caches do not need a registry round-trip.
#
# Auth uses CI_JOB_TOKEN, which has write access to this project's
# package registry by default; no manual secrets required.
#
# Tests and jOOQ codegen run here. The original incarnation of this pipeline
# skipped tests because Testcontainers needed Docker-in-Docker and "tests run
# in GitHub anyway"; both legs are obsolete. The publish job now provisions a
# Postgres service and uses -Plocal-db to avoid Docker, and the rewrite
# reactor's compile graph depends on jOOQ-generated classes from
# graphitron-sakila-db anyway. Once the DB is up, running tests is a cheap
# sanity check at the deploy boundary.
#
# Javadoc and signing are not run: the `gitlab` profile attaches only sources,
# not javadoc, and there is no GPG signing here. Maven Central via the GitHub
# workflow's `-P release` is where javadoc + signed artifacts come from.

default:
  image: maven:3.9-eclipse-temurin-25

variables:
  MAVEN_OPTS: >-
    -Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository
    -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn
  MAVEN_CLI_OPTS: "--batch-mode --errors --show-version"

cache:
  key:
    files:
      - "**/pom.xml"
  paths:
    - .m2/repository

.maven-publish:
  before_script:
    - |
      cat > ci_settings.xml <<'EOF'
      <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0">
        <servers>
          <server>
            <id>gitlab-maven</id>
            <username>gitlab-ci-token</username>
            <password>${env.CI_JOB_TOKEN}</password>
          </server>
        </servers>
      </settings>
      EOF

publish:release:
  extends: .maven-publish
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+(-RC\d+)?$/
  services:
    - name: postgres:18-alpine
      alias: postgres
  variables:
    POSTGRES_DB: rewrite_test
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres
    POSTGRES_HOST_AUTH_METHOD: trust
  script: |
    set -e
    apt-get update -qq && apt-get install -y -qq postgresql-client gcc make git
    # libtree-sitter runtime for the graphitron-lsp tests: jtreesitter 0.26 looks up
    # ts_language_abi_version at Language.load (a symbol introduced in tree-sitter 0.25),
    # and the bundled grammar (graphitron-tree-sitter-natives) targets the 0.26.x ABI.
    # apt's libtree-sitter0 is 0.20.x and too old, and Debian experimental is an
    # unpinnable, rolling suite (an unpinned `-t experimental` install silently regressed
    # to the stale 0.20.x runtime, producing "Symbol not found: ts_language_abi_version").
    # Build the pinned runtime from source instead, mirroring the post-deploy matrix in
    # .github/workflows/tree-sitter-natives-release.yml.
    TS_VERSION=v0.26.9
    TS_DIR=$(mktemp -d)
    git clone --depth=1 --branch=$TS_VERSION https://github.com/tree-sitter/tree-sitter "$TS_DIR"
    make -C "$TS_DIR"
    make -C "$TS_DIR" install
    ldconfig
    rm -rf "$TS_DIR"
    PGPASSWORD=postgres psql -h postgres -U postgres -d rewrite_test -f graphitron-sakila-db/src/main/resources/init.sql
    VERSION=${CI_COMMIT_TAG#v}
    echo "Releasing version $VERSION to GitLab Packages"
    mvn $MAVEN_CLI_OPTS versions:set -DnewVersion=$VERSION -DgenerateBackupPoms=false -DprocessAllModules=true
    mvn $MAVEN_CLI_OPTS -Ddb.url=jdbc:postgresql://postgres:5432/rewrite_test -Dtest.db.url=jdbc:postgresql://postgres:5432/rewrite_test -s ci_settings.xml clean deploy -P gitlab,local-db
