# Publishes the graphitron-rewrite reactor to the Sikt GitLab Packages Maven
# registry as a secondary distribution channel alongside Maven Central.
# See https://platon.sikt.no/tjenester/package_registry
#
# Triggers:
#   - tags matching v<MAJOR>.<MINOR>.<PATCH>(-RC<n>)?  -> release deploy
#
# Default-branch pushes do not trigger any publish. Snapshots are not a
# useful consumer-facing artifact: consumers depend on release coordinates,
# and developer caches do not need a registry round-trip.
#
# Auth uses CI_JOB_TOKEN, which has write access to this project's
# package registry by default; no manual secrets required.
#
# Tests, jOOQ codegen, and javadoc all run here. The original incarnation
# of this pipeline skipped tests because Testcontainers needed Docker-in-Docker
# and "tests run in GitHub anyway"; both legs are obsolete. The publish job
# now provisions a Postgres service and uses -Plocal-db to avoid Docker, and
# the rewrite reactor's compile graph depends on jOOQ-generated classes from
# graphitron-sakila-db anyway. Once the DB is up, running tests is a cheap
# sanity check at the deploy boundary.

default:
  image: maven:3.9-eclipse-temurin-25

variables:
  MAVEN_OPTS: >-
    -Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository
    -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn
  MAVEN_CLI_OPTS: "--batch-mode --errors --show-version"

cache:
  key:
    files:
      - "**/pom.xml"
  paths:
    - .m2/repository

.maven-publish:
  before_script:
    - |
      cat > ci_settings.xml <<'EOF'
      <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0">
        <servers>
          <server>
            <id>gitlab-maven</id>
            <username>gitlab-ci-token</username>
            <password>${env.CI_JOB_TOKEN}</password>
          </server>
        </servers>
      </settings>
      EOF

publish:release:
  extends: .maven-publish
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+(-RC\d+)?$/
  services:
    - name: postgres:18-alpine
      alias: postgres
  variables:
    POSTGRES_DB: rewrite_test
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres
    POSTGRES_HOST_AUTH_METHOD: trust
  script:
    - apt-get update -qq && apt-get install -y -qq postgresql-client gcc
    - PGPASSWORD=postgres psql -h postgres -U postgres -d rewrite_test -f graphitron-rewrite/graphitron-sakila-db/src/main/resources/init.sql
    - VERSION=${CI_COMMIT_TAG#v}
    - echo "Releasing version $VERSION to GitLab Packages"
    - mvn -f graphitron-rewrite/pom.xml $MAVEN_CLI_OPTS versions:set -DnewVersion=$VERSION -DgenerateBackupPoms=false -DprocessAllModules=true
    - mvn -f graphitron-rewrite/pom.xml $MAVEN_CLI_OPTS -Ddb.url=jdbc:postgresql://postgres:5432/rewrite_test -s ci_settings.xml clean deploy -P gitlab,local-db
