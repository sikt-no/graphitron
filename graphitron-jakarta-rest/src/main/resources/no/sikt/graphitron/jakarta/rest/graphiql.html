<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <title>GraphiQL</title>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <style>
        body { margin: 0; }
        #graphiql { height: 100dvh; }
    </style>
    <!--
      Self-hosted GraphiQL. The version-pinned bundle (built by tools/graphiql-build) ships as
      classpath resources under this package's graphiql/ directory; GraphqlResource streams them
      from the assets endpoint, so the playground works offline, behind a strict CSP, and on
      air-gapped networks with no runtime CDN dependency. {{ASSET_BASE}} is rewritten at serve
      time to the absolute .../graphql/assets/ prefix so the entry files resolve correctly wherever
      the resource is mounted; every downstream chunk/worker/font resolves relative to them.
      Self-hosting trades a leaner runtime jar for the small, known consumer set (see R416); an
      opt-in -graphiql artifact is the escape hatch if that trade-off ever pinches a consumer.
    -->
    <link rel="stylesheet" href="{{ASSET_BASE}}graphiql.css"/>
</head>
<body>
<div id="graphiql">Loading GraphiQL…</div>
<script type="module" src="{{ASSET_BASE}}graphiql.js"></script>
</body>
</html>
