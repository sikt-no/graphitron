<script type="module">
  const blocks = document.querySelectorAll('code[data-lang="mermaid"]');
  if (blocks.length > 0) {
    const { default: mermaid } = await import('https://cdn.jsdelivr.net/npm/mermaid@11.4/dist/mermaid.esm.min.mjs');
    const nodes = [];
    blocks.forEach((code) => {
      const pre = code.closest('pre') ?? code;
      const replacement = document.createElement('pre');
      replacement.className = 'mermaid';
      replacement.textContent = code.textContent;
      pre.replaceWith(replacement);
      nodes.push(replacement);
    });
    mermaid.initialize({ startOnLoad: false });
    await mermaid.run({ nodes });
  }
</script>
